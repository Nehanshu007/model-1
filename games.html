<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chess Style Tic Tac Toe</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .game-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 5px;
      margin-top: 20px;
    }

    .cell {
      width: 120px;
      height: 120px;
      background: white;
      border: 3px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      cursor: pointer;
      transition: 0.3s;
    }

    .cell:hover {
      background: #e8e8e8;
    }

    #status {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <h1>Chess Style Tic Tac Toe</h1>

  <div class="game-container">

    <div class="board" id="board">
      <div class="cell" onclick="play(this,0)"></div>
      <div class="cell" onclick="play(this,1)"></div>
      <div class="cell" onclick="play(this,2)"></div>
      <div class="cell" onclick="play(this,3)"></div>
      <div class="cell" onclick="play(this,4)"></div>
      <div class="cell" onclick="play(this,5)"></div>
      <div class="cell" onclick="play(this,6)"></div>
      <div class="cell" onclick="play(this,7)"></div>
      <div class="cell" onclick="play(this,8)"></div>
    </div>

    <div id="status">Player ♔ Turn</div>

    <button onclick="resetGame()">Reset Game</button>

  </div>

  <script>
    let currentPlayer = "♔";
    let board = ["", "", "", "", "", "", "", "", ""];
    let gameOver = false;

    const winPatterns = [
      [0,1,2],
      [3,4,5],
      [6,7,8],
      [0,3,6],
      [1,4,7],
      [2,5,8],
      [0,4,8],
      [2,4,6]
    ];

    function play(cell, index) {

      if(board[index] !== "" || gameOver) {
        return;
      }

      board[index] = currentPlayer;
      cell.innerHTML = currentPlayer;

      checkWinner();

      currentPlayer = currentPlayer === "♔" ? "♛" : "♔";

      if(!gameOver) {
        document.getElementById("status").innerHTML =
          "Player " + currentPlayer + " Turn";
      }
    }

    function checkWinner() {

      for(let pattern of winPatterns) {

        let a = pattern[0];
        let b = pattern[1];
        let c = pattern[2];

        if(
          board[a] &&
          board[a] === board[b] &&
          board[a] === board[c]
        ) {
          document.getElementById("status").innerHTML =
            "Player " + board[a] + " Wins!";
          gameOver = true;
          return;
        }
      }

      if(!board.includes("")) {
        document.getElementById("status").innerHTML = "Match Draw!";
        gameOver = true;
      }
    }

    function resetGame() {

      board = ["", "", "", "", "", "", "", "", ""];
      gameOver = false;
      currentPlayer = "♔";

      document.querySelectorAll(".cell").forEach(cell => {
        cell.innerHTML = "";
      });

      document.getElementById("status").innerHTML =
        "Player ♔ Turn";
    }
  </script>

</body>
</html>
